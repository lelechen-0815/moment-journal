<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>验证成功 · 我的时刻</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,system-ui,sans-serif;background:#f9fafb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border-radius:24px;padding:48px 32px;text-align:center;max-width:360px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
.icon{font-size:64px;margin-bottom:20px;animation:pop .5s ease;}
@keyframes pop{0%{transform:scale(0.5);opacity:0;}80%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
.title{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:10px;}
.sub{font-size:15px;color:#6B7280;line-height:1.7;margin-bottom:32px;}
.btn{display:inline-block;padding:13px 32px;background:#34D399;color:#fff;text-decoration:none;border-radius:16px;font-size:16px;font-weight:600;transition:background .15s;}
.btn:hover{background:#10B981;}
.hint{font-size:13px;color:#9CA3AF;margin-top:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <div class="title">邮箱验证成功！</div>
  <div class="sub">你的账号已激活，现在可以登录「我的时刻」开始记录你的每一个真实瞬间。</div>
  <a href="https://my-moment-journal.com" class="btn">🌿 去登录</a>
  <div class="hint">点击按钮回到 App 登录</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const sb = supabase.createClient(
  'https://rwvhvfmfxjspnxsitsxj.supabase.co',
  'sb_publishable_c1x7dVYf-NQ0jYo8osud7Q_4sp5EXrY'
);

// 自动处理验证 token
(async()=>{
  const params = new URLSearchParams(window.location.search);
  const tokenHash = params.get('token_hash');
  const type = params.get('type');
  if(tokenHash && type === 'email'){
    await sb.auth.verifyOtp({token_hash: tokenHash, type: 'email'});
  }
  const hash = window.location.hash;
  if(hash && hash.includes('access_token')){
    await sb.auth.getSession();
  }
})();
</script>
</body>
</html>
