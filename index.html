<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>我的时刻 🌿</title>
<link rel="manifest" href="/manifest.json">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:#fff;}
body{font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column;}

/* ── Auth ── */
.auth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;}
.auth-logo{font-size:48px;margin-bottom:12px;}
.auth-title{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.auth-sub{font-size:14px;color:#9CA3AF;margin-bottom:36px;}
.auth-card{width:100%;max-width:360px;background:#fff;border:1.5px solid #E5E7EB;border-radius:20px;padding:24px;}
.auth-tabs{display:flex;margin-bottom:20px;background:#F3F4F6;border-radius:12px;padding:3px;}
.auth-tab{flex:1;text-align:center;padding:8px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;color:#6B7280;transition:all .15s;}
.auth-tab.active{background:#fff;color:#1a1a1a;font-weight:600;}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:13px;color:#6B7280;margin-bottom:6px;font-weight:500;}
.auth-field input{width:100%;height:44px;padding:0 44px 0 14px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:15px;color:#1a1a1a;outline:none;transition:border-color .15s;}
.auth-field input.no-icon{padding:0 14px;}
.auth-field input:focus{border-color:#34D399;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-wrap input{flex:1;}
.eye-btn{position:absolute;right:0;top:0;bottom:0;width:44px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;border-radius:0 12px 12px 0;}
.eye-btn svg{width:18px;height:18px;stroke:#9CA3AF;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s;}
.eye-btn:hover svg{stroke:#374151;}
.forgot-row{text-align:right;margin-top:-6px;margin-bottom:10px;}
.forgot-link{font-size:13px;color:#34D399;cursor:pointer;font-weight:500;}
.spam-hint{font-size:12px;color:#9CA3AF;text-align:center;margin-top:6px;line-height:1.6;}
.nickname-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.nickname-text{font-size:15px;font-weight:600;color:#1a1a1a;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nickname-placeholder{font-size:15px;font-weight:500;color:#D1D5DB;flex:1;}
.edit-nick-btn{width:22px;height:22px;border-radius:6px;border:1.5px solid #E5E7EB;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.edit-nick-btn:hover{border-color:#34D399;background:#ECFDF5;}
.edit-nick-btn svg{width:11px;height:11px;stroke:#9CA3AF;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nickname-edit-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.nickname-input{flex:1;height:32px;padding:0 10px;border:1.5px solid #34D399;border-radius:10px;font-size:14px;color:#1a1a1a;outline:none;background:#fff;}
.nick-save-btn{height:32px;padding:0 12px;background:#34D399;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.nick-cancel-btn{height:32px;width:32px;background:#F3F4F6;color:#6B7280;border:none;border-radius:10px;font-size:14px;cursor:pointer;}
.field-hint{font-size:12px;margin-top:5px;}
.field-hint.err{color:#EF4444;}
.field-hint.ok{color:#059669;}
.field-hint.gray{color:#9CA3AF;}
.auth-submit{width:100%;height:46px;background:#34D399;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .15s;}
.auth-submit:hover{background:#10B981;}
.auth-submit:disabled{background:#D1D5DB;cursor:not-allowed;}
.auth-err{font-size:13px;text-align:center;margin-top:10px;min-height:18px;font-weight:500;}
.switch-hint{font-size:13px;color:#9CA3AF;text-align:center;margin-top:14px;}
.switch-hint span{color:#34D399;cursor:pointer;font-weight:500;}
.auth-pane{display:none;}
.auth-pane.active{display:block;}

/* ── Tabbar ── */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #F3F4F6;display:flex;z-index:100;padding-bottom:max(env(safe-area-inset-bottom),12px);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 0 10px;cursor:pointer;gap:4px;}
.tab-icon{font-size:24px;line-height:1;}
.tab-label{font-size:12px;color:#9CA3AF;font-weight:500;}
.tab.active .tab-label{color:#34D399;}

.page{display:none;flex:1;overflow-y:auto;padding-bottom:80px;}
.page.active{display:block;}

/* ── 此刻页 ── */
.topbar{padding:calc(env(safe-area-inset-top, 0px) + 24px) 18px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid #F3F4F6;}
.topbar-brand{font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-.5px;}
.topbar-brand span{color:#34D399;}
.topbar-sub{font-size:12px;color:#9CA3AF;margin-top:2px;}
.topbar-count{background:#ECFDF5;color:#059669;font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;white-space:nowrap;}
.cats-scroll{padding:12px 18px 4px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.cats-scroll::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #E5E7EB;color:#6B7280;background:#fff;transition:all .18s;user-select:none;-webkit-user-select:none;}
.cat-chip:hover{border-color:#6EE7B7;color:#059669;}
.cat-chip.active{background:#ECFDF5;border-color:#6EE7B7;color:#059669;}
.cat-chip.custom.pressing{opacity:.6;transform:scale(0.95);}
.custom-cats-label{font-size:11px;color:#9CA3AF;padding:10px 18px 4px;font-weight:500;letter-spacing:.04em;}
.add-cat-wrap{padding:4px 18px 12px;display:flex;gap:8px;}
.add-cat-input{flex:1;height:38px;padding:0 14px;border:1.5px solid #E5E7EB;border-radius:18px;font-size:13px;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s;}
.add-cat-input:focus{border-color:#34D399;}
.add-cat-input::placeholder{color:#D1D5DB;}
.add-cat-btn{height:38px;padding:0 16px;border:1.5px solid #E5E7EB;border-radius:18px;font-size:13px;cursor:pointer;background:#fff;color:#6B7280;font-weight:500;}
.add-cat-btn:hover{border-color:#6EE7B7;color:#059669;background:#ECFDF5;}
.divider{height:1px;background:#F3F4F6;margin:0 18px 12px;}
.write-card{margin:0 18px 16px;background:#fff;border-radius:20px;border:1.5px solid #6EE7B7;padding:16px;}
.write-cat-badge{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.current-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:12px;font-size:13px;font-weight:600;}
.badge-hint{font-size:12px;color:#9CA3AF;}
.write-textarea{width:100%;border:none;outline:none;resize:none;font-size:16px;line-height:1.75;color:#1a1a1a;background:transparent;min-height:88px;font-family:inherit;}
.write-textarea::placeholder{color:#D1D5DB;}
.media-bar{display:flex;gap:8px;padding:10px 0 8px;border-top:1px solid #F3F4F6;}
.media-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:12px;border:1.5px solid #E5E7EB;background:#fff;font-size:13px;color:#6B7280;cursor:pointer;font-weight:500;transition:all .15s;}
.media-btn:hover{border-color:#6EE7B7;color:#059669;background:#ECFDF5;}
.media-btn.recording{background:#FFFBEB;border-color:#FCD34D;color:#B45309;}
.img-previews{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px;}
.img-thumb{position:relative;width:72px;height:72px;border-radius:12px;overflow:hidden;border:1.5px solid #E5E7EB;}
.img-thumb img{width:100%;height:100%;object-fit:cover;}
.img-thumb video{width:100%;height:100%;object-fit:cover;}
.img-thumb .video-badge{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,0.5);color:#fff;font-size:9px;padding:1px 4px;border-radius:4px;pointer-events:none;}
.img-del{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.4);color:#fff;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.audio-preview{display:flex;align-items:center;gap:8px;background:#ECFDF5;border-radius:12px;padding:8px 12px;margin:4px 0;}
.audio-preview audio{flex:1;height:32px;}
.audio-del{background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:20px;line-height:1;padding:0 4px;}
.audio-list{display:flex;flex-direction:column;gap:4px;margin:6px 0 4px;}
.entry-video{width:100%;max-height:220px;border-radius:10px;margin-top:8px;object-fit:contain;background:#000;}
.video-wrap{position:relative;display:inline-block;width:80px;height:80px;border-radius:10px;overflow:hidden;border:1.5px solid #F3F4F6;cursor:pointer;}
.video-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
.video-thumb-canvas{width:100%;height:100%;object-fit:cover;display:block;background:#E5E7EB;}
.video-play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);transition:background .15s;}
.video-play-btn:hover{background:rgba(0,0,0,0.45);}
.video-play-btn svg{width:28px;height:28px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4));}
.video-fullscreen{position:fixed;inset:0;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center;}
.video-fullscreen video{max-width:100%;max-height:100%;}
.video-close-btn{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1001;}
.write-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.char-hint{font-size:12px;color:#D1D5DB;}
.send-btn{display:flex;align-items:center;gap:6px;padding:9px 22px;background:#34D399;color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;}
.send-btn:hover{background:#10B981;}
.send-btn:active{transform:scale(0.97);}
.rec-timer{font-size:12px;color:#B45309;font-weight:600;}

/* ── 回顾页 ── */
.hist-topbar{padding:calc(env(safe-area-inset-top, 0px) + 24px) 18px 0;background:#fff;position:sticky;top:0;z-index:10;border-bottom:1px solid #F3F4F6;}
.hist-title{font-size:22px;font-weight:700;color:#1a1a1a;}
.hist-title span{color:#34D399;}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 8px;}
.section-label{font-size:13px;font-weight:600;color:#374151;}
.section-count{font-size:12px;color:#9CA3AF;}
.entries{padding:0 18px 32px;display:flex;flex-direction:column;gap:10px;}
.entry-card{background:#fff;border:1.5px solid #F3F4F6;border-radius:18px;padding:14px 16px;transition:border-color .18s;}
.entry-card:hover{border-color:#6EE7B7;}
.entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.entry-badge{display:flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:10px;font-weight:600;}
.entry-right{display:flex;align-items:center;gap:8px;}
.entry-time{font-size:12px;color:#9CA3AF;}
.more-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:none;cursor:pointer;color:#C4B5FD;font-size:16px;font-weight:700;letter-spacing:1px;line-height:1;transition:all .15s;position:relative;}
.more-btn:hover{background:#F3F4F6;color:#374151;}
.dropdown{position:absolute;top:34px;right:0;background:#fff;border:1.5px solid #E5E7EB;border-radius:14px;padding:6px;min-width:110px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
.dropdown-item{display:flex;align-items:center;padding:9px 14px;border-radius:10px;font-size:14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;color:#374151;transition:background .12s;}
.dropdown-item:hover{background:#F3F4F6;}
.dropdown-item.danger{color:#EF4444;}
.dropdown-item.danger:hover{background:#FEF2F2;}
.entry-text{font-size:15px;color:#374151;line-height:1.7;word-break:break-all;cursor:pointer;}
.entry-text.clamped{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.expand-hint{font-size:12px;color:#34D399;margin-top:5px;font-weight:500;cursor:pointer;}
.entry-imgs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.entry-img{width:80px;height:80px;border-radius:10px;object-fit:cover;border:1.5px solid #F3F4F6;}
.entry-audio{margin-top:8px;}
.entry-audio audio{width:100%;height:32px;}
.edit-area{width:100%;border:1.5px solid #34D399;border-radius:12px;padding:10px 12px;font-size:15px;line-height:1.7;color:#1a1a1a;background:#fff;outline:none;resize:none;font-family:inherit;margin-top:4px;}
.edit-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.save-edit-btn{padding:7px 18px;background:#34D399;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;}
.cancel-edit-btn{padding:7px 14px;background:#fff;color:#6B7280;border:1.5px solid #E5E7EB;border-radius:12px;font-size:13px;cursor:pointer;}

/* ── 个人页 ── */
.profile-topbar{padding:calc(env(safe-area-inset-top, 0px) + 24px) 18px 16px;border-bottom:1px solid #F3F4F6;position:sticky;top:0;background:#fff;z-index:10;}
.profile-topbar-title{font-size:22px;font-weight:700;color:#1a1a1a;}
.profile-topbar-title span{color:#34D399;}
.profile-header{display:flex;align-items:center;gap:16px;padding:20px 18px 16px;border-bottom:1px solid #F3F4F6;}
.avatar-wrap{position:relative;cursor:pointer;flex-shrink:0;}
.avatar{width:64px;height:64px;border-radius:50%;background:#ECFDF5;border:2px solid #6EE7B7;display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;transition:transform .15s;}
.avatar:active{transform:scale(0.95);}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-edit-badge{position:absolute;bottom:0;right:0;width:20px;height:20px;background:#34D399;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid #fff;}
.profile-info{flex:1;}
.profile-email{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:3px;}
.profile-joined{font-size:12px;color:#9CA3AF;}
.stats-row{display:flex;padding:16px 18px;gap:12px;border-bottom:1px solid #F3F4F6;}
.stat-card{flex:1;background:#F9FAFB;border-radius:14px;padding:14px 12px;text-align:center;}
.stat-num{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:2px;}
.stat-label{font-size:12px;color:#9CA3AF;}
.p-section{padding:16px 18px 0;}
.p-section-title{font-size:11px;color:#9CA3AF;font-weight:500;letter-spacing:.04em;margin-bottom:8px;}
.menu-card{background:#fff;border:1.5px solid #F3F4F6;border-radius:16px;overflow:hidden;margin-bottom:16px;}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #F9FAFB;cursor:pointer;transition:background .15s;}
.menu-item:last-child{border-bottom:none;}
.menu-item:active{background:#F9FAFB;}
.m-item-left{display:flex;align-items:center;gap:12px;}
.m-item-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.m-item-label{font-size:15px;color:#1a1a1a;font-weight:500;}
.m-item-arrow{color:#D1D5DB;font-size:18px;}
.menu-item.logout .m-item-label{color:#EF4444;}
.menu-item.logout .m-item-arrow{color:#FCA5A5;}

/* ── Emoji picker ── */
.emoji-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:flex-end;justify-content:center;}
.emoji-overlay.show{display:flex;}
.emoji-sheet{background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:480px;}
.emoji-sheet-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:16px;text-align:center;}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.emoji-opt{aspect-ratio:1;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;border:2px solid transparent;transition:all .15s;background:#F9FAFB;}
.emoji-opt:active{transform:scale(0.9);}
.emoji-opt.selected{border-color:#34D399;background:#ECFDF5;}
.upload-opt{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px dashed #D1D5DB;transition:all .15s;background:#F9FAFB;gap:2px;}
.upload-opt:hover{border-color:#34D399;background:#ECFDF5;}
.upload-plus{font-size:22px;color:#9CA3AF;line-height:1;}
.upload-label{font-size:10px;color:#9CA3AF;}
.emoji-cancel{width:100%;height:44px;margin-top:14px;background:#F3F4F6;border:none;border-radius:14px;font-size:15px;color:#6B7280;cursor:pointer;}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;}
.modal-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:16px;}
.modal-input{width:100%;height:44px;padding:0 14px;border:1.5px solid #E5E7EB;border-radius:14px;font-size:15px;color:#1a1a1a;outline:none;transition:border-color .15s;}
.modal-input:focus{border-color:#34D399;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-save{flex:1;height:44px;background:#34D399;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;}
.modal-del{height:44px;padding:0 20px;background:#FEF2F2;color:#EF4444;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;}
.modal-cancel{height:44px;padding:0 20px;background:#F3F4F6;color:#6B7280;border:none;border-radius:14px;font-size:15px;cursor:pointer;}

.empty-state{text-align:center;padding:64px 20px;}
.empty-emoji{font-size:48px;margin-bottom:14px;}
.empty-text{font-size:15px;font-weight:500;color:#9CA3AF;margin-bottom:6px;}
.empty-sub{font-size:13px;color:#D1D5DB;}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#9CA3AF;font-size:14px;}
.splash{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
.splash-logo{font-size:56px;animation:pulse 1.5s ease-in-out infinite;}
.splash-text{font-size:14px;color:#9CA3AF;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:0.7;}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 骨架屏 ── */
.skeleton{background:linear-gradient(90deg,#F3F4F6 25%,#E9EAEC 50%,#F3F4F6 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skeleton-card{margin:0 18px 12px;background:#fff;border-radius:18px;border:1.5px solid #F3F4F6;padding:14px 16px;}
.skeleton-line{height:13px;margin-bottom:10px;}
.skeleton-line.short{width:35%;}
.skeleton-line.medium{width:65%;}
.skeleton-line.long{width:90%;}
.skeleton-badge{width:56px;height:22px;border-radius:10px;margin-bottom:12px;}
.skeleton-count{width:44px;height:26px;border-radius:20px;display:inline-block;}
.skeleton-cats{padding:12px 18px 4px;display:flex;gap:8px;}
.skeleton-cat-chip{height:32px;border-radius:20px;flex-shrink:0;}
</style>

// ── 忘记密码 ──
async function doForgotPwd(){
  const email=document.getElementById('login-email').value.trim();
  const err=document.getElementById('login-err');
  if(!email){err.style.color='#EF4444';err.textContent='请先填写邮箱';return;}
  err.style.color='#9CA3AF';err.textContent='发送中…';
  const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://my-moment-journal.com/reset.html'});
  if(error){err.style.color='#EF4444';err.textContent='发送失败，请重试';}
  else{err.style.color='#059669';err.textContent='重置邮件已发送，请查收邮箱 📬';}
}

function startEditNick(){

  document.getElementById('nickname-display').style.display='none';
  document.getElementById('nickname-edit').style.display='block';

}
async function saveNick(){

// ── Auth ──
function switchAuthTab(mode,keepMsg=false){
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-signup').classList.toggle('active',mode==='signup');
  document.getElementById('pane-login').classList.toggle('active',mode==='login');
  document.getElementById('pane-signup').classList.toggle('active',mode==='signup');
  if(!keepMsg){
    document.getElementById('login-err').textContent='';
    document.getElementById('reg-err').textContent='';
  }
}
function checkReg(){
  const email=document.getElementById('reg-email').value.trim();
  const p1=document.getElementById('reg-pwd1').value;
  const p2=document.getElementById('reg-pwd2').value;
  const h1=document.getElementById('pwd1-hint');
  const h2=document.getElementById('pwd2-hint');
  const btn=document.getElementById('reg-btn');
  if(p1.length===0){h1.className='field-hint gray';h1.textContent='密码至少 6 位';}
  else if(p1.length<6){h1.className='field-hint err';h1.textContent='密码至少 6 位';}
  else{h1.className='field-hint ok';h1.textContent='✓ 密码强度符合要求';}
  if(p2.length===0){h2.textContent='';}
  else if(p1!==p2){h2.className='field-hint err';h2.textContent='两次密码不一致';}
  else{h2.className='field-hint ok';h2.textContent='✓ 密码一致';}
  btn.disabled=!(email&&p1.length>=6&&p1===p2);
}
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pwd=document.getElementById('login-pwd').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-err');
  err.style.color='#EF4444';
  if(!email||!pwd){err.textContent='请填写邮箱和密码';return;}
  btn.disabled=true;btn.textContent='登录中…';err.textContent='';
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pwd});
    if(error){
      if(error.message.includes('Invalid login credentials'))throw new Error('邮箱或密码错误');
      throw new Error('登录失败，请重试');
    }
    currentUser=data.user;
    await initApp();
  }catch(e){
    err.textContent=e.message||'登录失败，请重试';
    btn.disabled=false;btn.textContent='登录';
  }
}
async function doSignup(){
  const email=document.getElementById('reg-email').value.trim();
  const pwd=document.getElementById('reg-pwd1').value;
  const btn=document.getElementById('reg-btn');
  const err=document.getElementById('reg-err');
  err.style.color='#EF4444';
  btn.disabled=true;btn.textContent='注册中…';err.textContent='';
  try{
    const{data,error}=await sb.auth.signUp({email,password:pwd});
    if(error)throw new Error('注册失败：'+error.message);
    if(data.session){
      currentUser=data.user;
      await initApp();
    }else{
      switchAuthTab('login',true);
      const loginErr=document.getElementById('login-err');
      loginErr.style.color='#059669';
      loginErr.textContent='注册成功！验证邮件已发送，请查收并完成验证。';
      btn.disabled=false;btn.textContent='注册';
    }
  }catch(e){
    err.textContent=e.message||'注册失败，请重试';
    btn.disabled=false;btn.textContent='注册';
  }
}
async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;customCats=[];entries=[];
  document.getElementById('main-app').style.display='none';
  document.getElementById('auth-page').style.display='block';
  document.getElementById('login-email').value='';
  document.getElementById('login-pwd').value='';
  document.getElementById('login-err').textContent='';
  switchAuthTab('login');
}

// ── Init（加入骨架屏）──
async function initApp(){
  document.getElementById('auth-page').style.display='none';
  document.getElementById('main-app').style.display='flex';
  // 先显示骨架屏，让用户知道正在加载中
  showSkeleton();
  try{
    await loadCats();
    await loadEntries();
  }catch(e){
    console.error('initApp error',e);
    toast('数据加载异常，请刷新页面重试');
  }
  activeCat=SYS_CATS[0].id;
  renderHomeCats();renderWriteBadge();renderHistCats();renderCount();updateProfilePage();
}

// ── Cats ──
async function loadCats(){
  const{data,error}=await sb.from('custom_cats').select('*').eq('user_id',currentUser.id).order('created_at');
  if(error){toast('分类加载失败:'+error.message);console.error('loadCats error',error);return;}
  customCats=(data||[]).map(r=>({id:r.id,name:r.name,emoji:r.emoji||'',color:r.color,bg:r.bg}));
}
function allCats(){return[...SYS_CATS,...customCats];}
function allHistCats(){return[HIST_ALL,...SYS_CATS,...customCats];}
function renderHomeCats(){
  document.getElementById('home-sys-cats').innerHTML=SYS_CATS.map(c=>`
    <div class="cat-chip${activeCat===c.id?' active':''}" onclick="selectWriteCat('${c.id}')">
      <span style="font-size:14px">${c.emoji}</span>${c.name}
    </div>`).join('');
  document.getElementById('home-custom-cats').innerHTML=customCats.length
    ?customCats.map(c=>`
      <div class="cat-chip custom${activeCat===c.id?' active':''}"
        onclick="selectWriteCat('${c.id}')"
        onmousedown="startPress('${c.id}',this)" onmouseup="endPress()" onmouseleave="endPress()"
        ontouchstart="startPress('${c.id}',this)" ontouchend="endPress()" ontouchcancel="endPress()">
        ${c.name}
      </div>`).join('')
    :'<span style="font-size:13px;color:#D1D5DB;padding:4px 0;">还没有自定义分类</span>';
}
function renderWriteBadge(){
  const cat=allCats().find(c=>c.id===activeCat);
  if(!cat)return;
  document.getElementById('write-cat-badge').innerHTML=`
    <div class="current-badge" style="background:${cat.bg};color:${cat.color}">${cat.emoji||''}${cat.name}</div>
    <span class="badge-hint">点击上方可切换分类</span>`;
}
function selectWriteCat(id){activeCat=id;renderHomeCats();renderWriteBadge();}
function renderHistCats(){
  document.getElementById('hist-cats').innerHTML=allHistCats().map(c=>`
    <div class="cat-chip${histCat===c.id?' active':''}" onclick="setHistCat('${c.id}')">
      <span style="font-size:14px">${c.emoji}</span>${c.name}
    </div>`).join('');
}
function setHistCat(id){
  histCat=id;
  const f=allHistCats().find(c=>c.id===id);
  document.getElementById('hist-label').textContent=(f?.emoji||'')+' '+(id==='all'?'全部记录':f?.name||'');
  renderHistCats();renderEntries();
}
async function addCat(){
  const inp=document.getElementById('new-cat-input');
  const name=inp.value.trim();
  if(!name)return;
  if(allCats().find(c=>c.name===name)){toast('分类名称已存在');inp.value='';return;}
  const id='cat_'+Date.now();
  const p=CAT_COLORS[customCats.length%CAT_COLORS.length];
  customCats.push({id,name,emoji:'',color:p.color,bg:p.bg});
  inp.value='';renderHomeCats();renderHistCats();updateProfilePage();
  await sb.from('custom_cats').insert({id,user_id:currentUser.id,name,emoji:'',color:p.color,bg:p.bg});
  if(!hintShown){setTimeout(()=>toast('💡 长按分类标签可以编辑或删除'),400);hintShown=true;}
  else toast('分类已添加');
}
function startPress(id,el){
  pressActive=true;pressEl=el;el.classList.add('pressing');
  pressTimer=setTimeout(()=>{
    if(!pressActive)return;
    el.classList.remove('pressing');
    navigator.vibrate&&navigator.vibrate(30);
    openCatModal(id);
  },600);
}
function endPress(){
  pressActive=false;
  if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}
  if(pressEl){pressEl.classList.remove('pressing');pressEl=null;}
}
function openCatModal(id){
  editingCatId=id;
  const cat=customCats.find(c=>c.id===id);if(!cat)return;
  document.getElementById('modal-cat-input').value=cat.name;
  document.getElementById('cat-modal').classList.add('show');
  setTimeout(()=>document.getElementById('modal-cat-input').focus(),100);
}
function closeCatModal(e){
  if(e&&e.target!==document.getElementById('cat-modal'))return;
  document.getElementById('cat-modal').classList.remove('show');editingCatId=null;
}
async function saveCat(){
  const name=document.getElementById('modal-cat-input').value.trim();
  if(!name){toast('请输入分类名称');return;}
  if(allCats().find(c=>c.name===name&&c.id!==editingCatId)){toast('分类名称已存在');return;}
  const cat=customCats.find(c=>c.id===editingCatId);
  if(cat)cat.name=name;
  await sb.from('custom_cats').update({name}).eq('id',editingCatId);
  document.getElementById('cat-modal').classList.remove('show');editingCatId=null;
  renderHomeCats();renderHistCats();renderEntries();toast('分类已更新');
}
async function deleteCat(){
  const cat=customCats.find(c=>c.id===editingCatId);
  const affected=entries.filter(e=>e.catId===editingCatId).length;
  const msg=affected>0
    ?`删除「${cat.name}」分类后，该分类下的 ${affected} 条记录将自动归入「日常」，是否继续？`
    :`确定删除「${cat.name}」分类？`;
  if(!confirm(msg))return;
  entries.forEach(e=>{if(e.catId===editingCatId)e.catId='daily';});
  await sb.from('entries').update({cat_id:'daily'}).eq('cat_id',editingCatId).eq('user_id',currentUser.id);
  await sb.from('custom_cats').delete().eq('id',editingCatId);
  customCats=customCats.filter(c=>c.id!==editingCatId);
  if(activeCat===editingCatId)activeCat=SYS_CATS[0].id;
  if(histCat===editingCatId)histCat='all';
  document.getElementById('cat-modal').classList.remove('show');editingCatId=null;
  renderHomeCats();renderWriteBadge();renderHistCats();renderEntries();updateProfilePage();
  toast(affected>0?`分类已删除，${affected} 条记录已归入「日常」`:'分类已删除');
}

// ── Entries ──
async function loadEntries(){
  const{data,error}=await sb.from('entries').select('*').eq('user_id',currentUser.id).order('ts',{ascending:false});
  if(error){toast('记录加载失败:'+error.message);console.error('loadEntries error',error);renderEntries();renderCount();return;}
  entries=(data||[]).map(r=>({id:r.id,catId:r.cat_id,text:r.text||'',imgs:r.imgs||[],audios:r.audios||(r.audio?[r.audio]:[]),ts:r.ts,expanded:false}));
  renderEntries();renderCount();
}
async function saveEntry(){
  const text=document.getElementById('write-text').value.trim();
  if(!text&&!pendingImgs.length&&!pendingAudios.length){toast('请输入内容再记录');return;}
  const id=Date.now(),ts=new Date().toISOString();
  const entry={id,catId:activeCat,text,imgs:[...pendingImgs],audios:[...pendingAudios],ts,expanded:false};
  entries.unshift(entry);
  document.getElementById('write-text').value='';
  pendingImgs=[];pendingAudios=[];
  updateChar();renderImgPrev();renderAudioList();renderCount();updateProfilePage();
  toast('记录成功 🌿');
  await sb.from('entries').insert({id,user_id:currentUser.id,cat_id:activeCat,text,imgs:entry.imgs,audios:entry.audios,ts});
}
async function deleteEntry(id){
  document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
  if(!confirm('确定删除这条记录？'))return;
  entries=entries.filter(e=>e.id!==id);
  renderEntries();renderCount();updateProfilePage();toast('已删除');
  await sb.from('entries').delete().eq('id',id);
}
async function saveEditEntry(id){
  const ta=document.getElementById('edit-ta-'+id);if(!ta)return;
  const text=ta.value.trim();
  const e=entries.find(e=>e.id===id);if(!e)return;
  e.text=text;
  e.imgs=editImgs[id]||e.imgs;
  e.audios=editAudios[id]||e.audios;
  delete editImgs[id];delete editAudios[id];
  editingEntryId=null;renderEntries();toast('已保存');
  await sb.from('entries').update({text,imgs:e.imgs,audios:e.audios}).eq('id',id);
}
function renderEntries(){
  const list=document.getElementById('entries-list');
  const filtered=histCat==='all'?entries:entries.filter(e=>e.catId===histCat);
  document.getElementById('hist-count').textContent=filtered.length?`共 ${filtered.length} 条`:'';
  if(!filtered.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-emoji">🌿</div><div class="empty-text">还没有记录</div><div class="empty-sub">去此刻记录你的第一个时刻吧～</div></div>`;
    return;
  }
  list.innerHTML=filtered.map(e=>{
    const cat=allCats().find(c=>c.id===e.catId)||SYS_CATS[0];
    const long=e.text&&e.text.length>100;
    const isEditing=editingEntryId===e.id;
    const imgs=e.imgs?.length?`<div class="entry-imgs">${e.imgs.map(s=>{
      const isVid=s.startsWith('data:video')||/\.(mp4|webm|mov)/i.test(s);
      const isGif=s.startsWith('data:image/gif')||/\.gif/i.test(s);
      if(isVid)return`<div class="video-wrap" onclick="openVideoPlayer('${s}')"><canvas class="video-thumb-canvas" data-src="${s}" width="80" height="80"></canvas><div class="video-play-btn"><svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="22" cy="22" r="22" fill="white" fill-opacity="0.9"/><polygon points="17,13 34,22 17,31" fill="#1a1a1a"/></svg></div></div>`;
      return`<img class="entry-img" src="${s}"${isGif?' style="object-fit:contain"':''}>`;
    }).join('')}</div>`:'';
    const audios=(e.audios||[]).length?`<div class="entry-audio">${(e.audios||[]).map(a=>`<audio controls src="${a}" style="width:100%;height:32px;display:block;margin-bottom:4px"></audio>`).join('')}</div>`:'';
    const curImgs=editImgs[e.id]||e.imgs||[];
    const curAudios=editAudios[e.id]||e.audios||[];
    const textBlock=isEditing
      ?`<textarea class="edit-area" id="edit-ta-${e.id}" rows="4">${e.text||''}</textarea>
        <div class="img-previews" id="edit-img-prev-${e.id}">${curImgs.map((s,i)=>{
          const isVid=s.startsWith('data:video')||/\.(mp4|webm|mov)/i.test(s);
          return`<div class="img-thumb">${isVid?`<video src="${s}" muted></video><span class="video-badge">视频</span>`:`<img src="${s}">`}<button class="img-del" onclick="rmEditImg(${e.id},${i})">×</button></div>`;
        }).join('')}</div>
        <div class="audio-list" id="edit-audio-list-${e.id}">${curAudios.map((a,i)=>`<div class="audio-preview"><audio controls src="${a}"></audio><button class="audio-del" onclick="rmEditAudio(${e.id},${i})">×</button></div>`).join('')}</div>
        <div class="media-bar" style="border-top:1px solid #F3F4F6;margin-top:4px;">
          <button class="media-btn" onclick="triggerEditImg(${e.id})"><span style="font-size:15px">🖼️</span> 添加图片/视频</button>
          <button class="media-btn" id="edit-rec-btn-${e.id}" onclick="toggleEditRecord(${e.id})"><span style="font-size:15px">🎙️</span> <span id="edit-rec-label-${e.id}">录音</span></button>
        </div>
        <input type="file" id="edit-img-input-${e.id}" accept="image/*,image/gif,video/mp4,video/quicktime,video/webm" multiple style="display:none" onchange="handleEditImgs(event,${e.id})">
        <div class="edit-footer">
          <button class="cancel-edit-btn" onclick="cancelEditEntry()">取消</button>
          <button class="save-edit-btn" onclick="saveEditEntry(${e.id})">保存</button>
        </div>`
      :`${e.text?`<div class="entry-text${long&&!e.expanded?' clamped':''}" onclick="toggleExpand(${e.id})">${e.text}</div>`:''}
        ${long?`<div class="expand-hint" onclick="toggleExpand(${e.id})">${e.expanded?'↑ 收起':'↓ 展开'}</div>`:''}`;
    return`<div class="entry-card">
      <div class="entry-top">
        <div class="entry-badge" style="background:${cat.bg};color:${cat.color}">
          <span style="font-size:13px">${cat.emoji||''}</span>${cat.name}
        </div>
        <div class="entry-right">
          <span class="entry-time">${fmtTime(e.ts)}</span>
          <div style="position:relative">
            <button class="more-btn" onclick="toggleMenu('menu-${e.id}')">···</button>
            <div class="dropdown" id="menu-${e.id}" style="display:none">
              <button class="dropdown-item" onclick="startEditEntry(${e.id})">编辑</button>
              <button class="dropdown-item" onclick="closeMenu('menu-${e.id}')">取消</button>
              <button class="dropdown-item danger" onclick="deleteEntry(${e.id})">删除</button>
            </div>
          </div>
        </div>
      </div>
      ${textBlock}${isEditing?'':imgs+audios}
    </div>`;
  }).join('');
  // 渲染完后截取视频封面
  setTimeout(captureVideoThumbs, 50);
}
function renderCount(){document.getElementById('total-count').textContent=entries.length+' 条';}

  if(!currentUser)return;
  userNickname=currentUser.user_metadata?.nickname||'';
  renderNickname();
  // 恢复头像
  const avatarImg=currentUser.user_metadata?.avatar_img||'';
  const avatarEmoji=currentUser.user_metadata?.avatar_emoji||'';
  if(avatarImg){
    document.getElementById('user-avatar').innerHTML=`<img src="${avatarImg}">`;
  } else if(avatarEmoji){
    selectedAvatar=avatarEmoji;
    document.getElementById('user-avatar').innerHTML=`<span id="avatar-content">${avatarEmoji}</span>`;
  }
  const email=currentUser.email||'—';
  const d=new Date(currentUser.created_at);
  const joined=`加入于 ${d.getFullYear()}年${d.getMonth()+1}月`;
  document.getElementById('profile-email').textContent=email;
  document.getElementById('profile-joined').textContent=joined;
  document.getElementById('profile-email2').textContent=email;
  document.getElementById('profile-joined2').textContent=joined;
  document.getElementById('stat-entries').textContent=entries.length;
  document.getElementById('stat-cats').textContent=customCats.length;

function openEmojiPicker(){document.getElementById('emoji-picker').classList.add('show');}
function closeEmojiPicker(e){if(!e||e.target===document.getElementById('emoji-picker'))document.getElementById('emoji-picker').classList.remove('show');}
async function setAvatar(emoji){
  selectedAvatar=emoji;
  document.getElementById('user-avatar').innerHTML=`<span id="avatar-content">${emoji}</span>`;
  document.querySelectorAll('.emoji-opt').forEach(o=>o.classList.remove('selected'));
  closeEmojiPicker();
  await sb.auth.updateUser({data:{avatar_emoji:emoji, avatar_img:''}});
  toast('头像已保存 🌿');
}
function handleAvatarUpload(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    const imgData=ev.target.result;
    document.getElementById('user-avatar').innerHTML=`<img src="${imgData}">`;
    closeEmojiPicker();
    await sb.auth.updateUser({data:{avatar_img:imgData, avatar_emoji:''}});
    toast('头像已保存 🌿');
  };
  r.readAsDataURL(file);e.target.value='';
}
(function(){
  const grid=document.getElementById('emoji-grid');

  up.className='upload-opt';
  up.innerHTML='<div class="upload-plus">＋</div><div class="upload-label">上传图片</div>';

// ── Utils ──
function fmtTime(iso){
  const d=new Date(iso);
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+
    ' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function updateChar(){document.getElementById('char-hint').textContent=document.getElementById('write-text').value.length+' / 500';}
function triggerImg(){document.getElementById('img-input').click();}
async function handleImgs(e){
  const files=[...e.target.files];
  if(pendingImgs.length+files.length>9){toast('最多 9 张图片/视频');return;}
  for(const f of files){
    const isVideo=f.type.startsWith('video/');
    if(isVideo){
      toast('视频上传中…');
      const ext=f.name.split('.').pop()||'mp4';
      const path=`${currentUser.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const{data,error}=await sb.storage.from('media').upload(path,f,{contentType:f.type,upsert:false});
      if(error){toast('视频上传失败：'+error.message);continue;}
      const{data:{publicUrl}}=sb.storage.from('media').getPublicUrl(path);
      // 存格式：video_url::thumb_base64
      pendingImgs.push(thumbData?`${publicUrl}::${thumbData}`:publicUrl);
    }else{
      await new Promise(resolve=>{
        const r=new FileReader();
        r.onload=ev=>{pendingImgs.push(ev.target.result);resolve();};
        r.readAsDataURL(f);
      });
    }
    renderImgPrev();
  }
  e.target.value='';
}
function renderImgPrev(){
  document.getElementById('img-previews').innerHTML=pendingImgs.map((s,i)=>{
    const isVid=s.startsWith('data:video')||(!s.startsWith('data:')&&/\.(mp4|webm|mov)/i.test(s));
    return`<div class="img-thumb">${isVid?`<video src="${s}" muted></video><span class="video-badge">视频</span>`:`<img src="${s}">`}<button class="img-del" onclick="rmImg(${i})">×</button></div>`;
  }).join('');
}
function rmImg(i){pendingImgs.splice(i,1);renderImgPrev();}

// ── 录音 ──
async function toggleRecord(){
  if(mediaRecorder&&mediaRecorder.state==='recording'){stopRec();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];
    const mimeType=MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'';
    mediaRecorder=mimeType?new MediaRecorder(stream,{mimeType}):new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=()=>{
      const blob=new Blob(audioChunks,{type:mimeType||'audio/mp4'});
      const r=new FileReader();r.onload=ev=>{pendingAudios.push(ev.target.result);renderAudioList();toast('录音完成 🎙️');};r.readAsDataURL(blob);
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start();recSeconds=0;
    document.getElementById('rec-btn').classList.add('recording');
    document.getElementById('rec-label').textContent='停止';
    document.getElementById('rec-timer').style.display='inline';
    recInterval=setInterval(()=>{
      recSeconds++;
      document.getElementById('rec-timer').textContent=String(Math.floor(recSeconds/60)).padStart(2,'0')+':'+String(recSeconds%60).padStart(2,'0');
      if(recSeconds>=60){stopRec();toast('最长录音 60 秒');}
    },1000);
  }catch{toast('无法访问麦克风，请确认在 HTTPS 下使用并允许权限');}
}
function stopRec(){
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    mediaRecorder.stop();clearInterval(recInterval);
    document.getElementById('rec-btn').classList.remove('recording');
    document.getElementById('rec-label').textContent='语音';
    document.getElementById('rec-timer').style.display='none';
  }
}
function renderAudioList(){
  document.getElementById('audio-preview').innerHTML=pendingAudios.length
    ?`<div class="audio-list">${pendingAudios.map((a,i)=>`<div class="audio-preview"><audio controls src="${a}"></audio><button class="audio-del" onclick="rmAudio(${i})">×</button></div>`).join('')}</div>`
    :'';
}
function rmAudio(i){pendingAudios.splice(i,1);renderAudioList();}

// ── 编辑模式媒体 ──
const editImgs={};
const editAudios={};
const editRecorders={};
function triggerEditImg(id){document.getElementById('edit-img-input-'+id).click();}
async function handleEditImgs(e,id){
  const files=[...e.target.files];
  if(!editImgs[id]){const entry=entries.find(x=>x.id===id);editImgs[id]=[...(entry?.imgs||[])];}
  if(editImgs[id].length+files.length>9){toast('最多 9 张图片/视频');return;}
  for(const f of files){
    const isVideo=f.type.startsWith('video/');
    if(isVideo){
      toast('视频上传中…');
      const ext=f.name.split('.').pop()||'mp4';
      const path=`${currentUser.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const{data,error}=await sb.storage.from('media').upload(path,f,{contentType:f.type,upsert:false});
      if(error){toast('视频上传失败：'+error.message);continue;}
      const{data:{publicUrl}}=sb.storage.from('media').getPublicUrl(path);
      editImgs[id].push(publicUrl);
    }else{
      await new Promise(resolve=>{
        const r=new FileReader();
        r.onload=ev=>{editImgs[id].push(ev.target.result);resolve();};
        r.readAsDataURL(f);
      });
    }
    renderEditImgPrev(id);
  }
  e.target.value='';
}
function renderEditImgPrev(id){
  const el=document.getElementById('edit-img-prev-'+id);if(!el)return;
  el.innerHTML=(editImgs[id]||[]).map((s,i)=>{
    const isVid=s.startsWith('data:video')||(!s.startsWith('data:')&&/\.(mp4|webm|mov)/i.test(s));
    return`<div class="img-thumb">${isVid?`<video src="${s}" muted></video><span class="video-badge">视频</span>`:`<img src="${s}">`}<button class="img-del" onclick="rmEditImg(${id},${i})">×</button></div>`;
  }).join('');
}
function rmEditImg(id,i){
  if(!editImgs[id]){const entry=entries.find(x=>x.id===id);editImgs[id]=[...(entry?.imgs||[])];}
  editImgs[id].splice(i,1);renderEditImgPrev(id);
}
async function toggleEditRecord(id){
  if(editRecorders[id]&&editRecorders[id].state==='recording'){editRecorders[id].stop();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const chunks=[];
    const mimeType=MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'';
    const mr=mimeType?new MediaRecorder(stream,{mimeType}):new MediaRecorder(stream);
    editRecorders[id]=mr;
    mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mr.onstop=()=>{
      const blob=new Blob(chunks,{type:mimeType||'audio/mp4'});
      const r=new FileReader();
      r.onload=ev=>{
        if(!editAudios[id]){const entry=entries.find(x=>x.id===id);editAudios[id]=[...(entry?.audios||[])];}
        editAudios[id].push(ev.target.result);
        renderEditAudioList(id);toast('录音完成 🎙️');
      };
      r.readAsDataURL(blob);
      stream.getTracks().forEach(t=>t.stop());
      const btn=document.getElementById('edit-rec-btn-'+id);
      const lbl=document.getElementById('edit-rec-label-'+id);
      if(btn)btn.classList.remove('recording');
      if(lbl)lbl.textContent='录音';
    };
    mr.start();
    const btn=document.getElementById('edit-rec-btn-'+id);
    const lbl=document.getElementById('edit-rec-label-'+id);
    if(btn)btn.classList.add('recording');
    if(lbl)lbl.textContent='停止';
  }catch{toast('无法访问麦克风');}
}
function renderEditAudioList(id){
  const el=document.getElementById('edit-audio-list-'+id);if(!el)return;
  el.innerHTML=(editAudios[id]||[]).map((a,i)=>`<div class="audio-preview"><audio controls src="${a}"></audio><button class="audio-del" onclick="rmEditAudio(${id},${i})">×</button></div>`).join('');
}
function rmEditAudio(id,i){
  if(!editAudios[id]){const entry=entries.find(x=>x.id===id);editAudios[id]=[...(entry?.audios||[])];}
  editAudios[id].splice(i,1);renderEditAudioList(id);
}
function toggleMenu(id){
  const m=document.getElementById(id);
  const show=m.style.display==='none';
  document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
  m.style.display=show?'block':'none';
  if(show){setTimeout(()=>document.addEventListener('click',function h(e){if(!m.contains(e.target)){m.style.display='none';document.removeEventListener('click',h);}},10));}
}
function closeMenu(id){document.getElementById(id).style.display='none';}
function startEditEntry(id){
  document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
  const entry=entries.find(e=>e.id===id);
  if(entry){editImgs[id]=[...(entry.imgs||[])];editAudios[id]=[...(entry.audios||[])];}
  editingEntryId=id;renderEntries();
  setTimeout(()=>{const ta=document.getElementById('edit-ta-'+id);if(ta){ta.focus();ta.selectionStart=ta.value.length;}},50);
}
function cancelEditEntry(){
  if(editingEntryId){delete editImgs[editingEntryId];delete editAudios[editingEntryId];}
  editingEntryId=null;renderEntries();
}
function toggleExpand(id){const e=entries.find(e=>e.id===id);if(e){e.expanded=!e.expanded;renderEntries();}}
function switchTab(tab){
  ['now','review','profile'].forEach(t=>{
    document.getElementById('page-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='review')renderEntries();
  if(tab==='profile')updateProfilePage();
}
document.getElementById('new-cat-input').addEventListener('keydown',e=>{if(e.key==='Enter')addCat();});
document.getElementById('modal-cat-input').addEventListener('keydown',e=>{if(e.key==='Enter')saveCat();});

// ── 视频全屏播放 ──
function openVideoPlayer(src){
  const overlay=document.createElement('div');
  overlay.className='video-fullscreen';
  overlay.innerHTML=`<video src="${src}" controls autoplay playsinline style="max-width:100%;max-height:100%;border-radius:8px;"></video><button class="video-close-btn" onclick="this.parentElement.remove()">✕</button>`;

// ── 修改密码 ──
function openChangePwd(){
  document.getElementById('pwd-current').value='';
  document.getElementById('pwd-new1').value='';
  document.getElementById('pwd-new2').value='';
  document.getElementById('pwd-err').textContent='';
  document.getElementById('pwd-save-btn').disabled=true;
  document.getElementById('pwd-modal').classList.add('show');
  setTimeout(()=>document.getElementById('pwd-current').focus(),100);
}
function closePwdModal(e){
  if(e&&e.target!==document.getElementById('pwd-modal'))return;
  document.getElementById('pwd-modal').classList.remove('show');
}
function checkPwdForm(){
  const p1=document.getElementById('pwd-new1').value;
  const p2=document.getElementById('pwd-new2').value;
  const err=document.getElementById('pwd-err');
  const btn=document.getElementById('pwd-save-btn');
  if(p1.length>0&&p1.length<6){err.style.color='#EF4444';err.textContent='新密码至少 6 位';btn.disabled=true;return;}
  if(p2.length>0&&p1!==p2){err.style.color='#EF4444';err.textContent='两次密码不一致';btn.disabled=true;return;}
  err.textContent='';
  btn.disabled=!(p1.length>=6&&p1===p2);
}
async function doChangePwd(){
  const cur=document.getElementById('pwd-current').value;
  const p1=document.getElementById('pwd-new1').value;
  const btn=document.getElementById('pwd-save-btn');
  const err=document.getElementById('pwd-err');
  if(!cur){err.style.color='#EF4444';err.textContent='请输入当前密码';return;}
  btn.disabled=true;btn.textContent='保存中…';err.textContent='';
  const{error:signInErr}=await sb.auth.signInWithPassword({email:currentUser.email,password:cur});
  if(signInErr){
    err.style.color='#EF4444';err.textContent='当前密码错误';
    btn.disabled=false;btn.textContent='保存';return;
  }
  const{error}=await sb.auth.updateUser({password:p1});
  if(error){
    err.style.color='#EF4444';err.textContent='修改失败：'+error.message;
    btn.disabled=false;btn.textContent='保存';return;
  }
  document.getElementById('pwd-modal').classList.remove('show');
  toast('密码已修改成功 🔒');
  btn.textContent='保存';
}

// ── 视频封面截帧 ──
function captureVideoThumbs(){
  document.querySelectorAll('.video-thumb-canvas').forEach(canvas=>{
    if(canvas.dataset.captured)return;
    canvas.dataset.captured='1';
    const src=canvas.dataset.src;
    const video=document.createElement('video');
    video.src=src;
    video.muted=true;
    video.playsInline=true;
    video.crossOrigin='anonymous';
    video.currentTime=0.5;
    video.addEventListener('seeked',()=>{
      try{
        const ctx=canvas.getContext('2d');
        canvas.width=video.videoWidth||80;
        canvas.height=video.videoHeight||80;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        video.src='';
      }catch(e){
        // 跨域视频无法截帧，保持灰色
      }
    },{once:true});
    video.addEventListener('loadeddata',()=>{video.currentTime=0.5;},{once:true});
    video.load();
  });
}

// ── 日历 ──
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

function openCalendar(){
  calYear=new Date().getFullYear();
  calMonth=new Date().getMonth();
  renderCalendar();
  document.getElementById('cal-modal').classList.add('show');
}
function closeCalendar(e){
  if(!e||e.target===document.getElementById('cal-modal'))
    document.getElementById('cal-modal').classList.remove('show');
}
function calPrevMonth(){
  calMonth--;
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function calNextMonth(){
  calMonth++;
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}
function renderCalendar(){
  const title=document.getElementById('cal-title');
  const grid=document.getElementById('cal-grid');
  title.textContent=calYear+'年'+(calMonth+1)+'月';

  const recordDays=new Set(entries.map(e=>e.ts.slice(0,10)));
  const today=new Date().toISOString().slice(0,10);
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();

  let html='';
  for(let i=0;i<firstDay;i++) html+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const hasRecord=recordDays.has(dateStr);
    const isToday=dateStr===today;
    const isFuture=dateStr>today;
    // 未来日期不显示
    if(isFuture){
      html+=`<div></div>`;
      continue;
    }
    if(isToday){
      // 今天：绿色实心（有记录）或描边（无记录），下方标"今天"
      const bg=hasRecord?'background:#34D399;color:white;font-weight:600;':'border:1.5px solid #34D399;color:#059669;font-weight:600;';
      html+=`<div style="display:flex;flex-direction:column;align-items:center;gap:1px;" onclick="jumpToDate('${dateStr}')">
        <div style="width:100%;text-align:center;font-size:13px;padding:4px 2px;border-radius:8px;cursor:pointer;${bg}">${d}</div>
        <span style="font-size:10px;color:#34D399;font-weight:500;">今天</span>
      </div>`;
    } else if(hasRecord){
      html+=`<div style="text-align:center;font-size:13px;padding:6px 2px;border-radius:8px;background:#34D399;color:white;font-weight:600;cursor:pointer;" onclick="jumpToDate('${dateStr}')">${d}</div>`;
    } else {
      html+=`<div style="text-align:center;font-size:13px;padding:6px 2px;border-radius:8px;color:#9CA3AF;">${d}</div>`;
    }
  }
  grid.innerHTML=html;
}
function jumpToDate(dateStr){
  document.getElementById('cal-modal').classList.remove('show');
  // 切换到回顾页
  switchTab('review');
  // 筛选该日期的记录
  const filtered=entries.filter(e=>e.ts.slice(0,10)===dateStr);
  const list=document.getElementById('entries-list');
  const d=new Date(dateStr);
  const label=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
  document.getElementById('hist-label').textContent='📅 '+label;
  document.getElementById('hist-count').textContent=filtered.length?`共 ${filtered.length} 条`:'';
  if(!filtered.length){
    list.innerHTML='<div class="empty-state"><div class="empty-emoji">📅</div><div class="empty-text">这一天没有记录</div><div class="empty-sub">去此刻写下今天的时刻吧～</div></div>';
    return;
  }
  list.innerHTML=filtered.map(e=>{
    const cat=allCats().find(c=>c.id===e.catId)||SYS_CATS[0];
    const long=e.text&&e.text.length>100;
    const imgs=e.imgs?.length?`<div class="entry-imgs">${e.imgs.map(s=>{
      const isVid=s.startsWith('data:video')||/\.(mp4|webm|mov)/i.test(s);
      if(isVid)return`<div class="video-wrap" onclick="openVideoPlayer('${s}')"><canvas class="video-thumb-canvas" data-src="${s}" width="80" height="80"></canvas><div class="video-play-btn"><svg viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="22" fill="white" fill-opacity="0.9"/><polygon points="17,13 34,22 17,31" fill="#1a1a1a"/></svg></div></div>`;
      return`<img class="entry-img" src="${s}">`;
    }).join('')}</div>`:'';
    const audios=(e.audios||[]).length?`<div class="entry-audio">${(e.audios||[]).map(a=>`<audio controls src="${a}" style="width:100%;height:32px;display:block;margin-bottom:4px"></audio>`).join('')}</div>`:'';
    return`<div class="entry-card">
      <div class="entry-top">
        <div class="entry-badge" style="background:${cat.bg};color:${cat.color}"><span style="font-size:13px">${cat.emoji||''}</span>${cat.name}</div>
        <div class="entry-right"><span class="entry-time">${fmtTime(e.ts)}</span></div>
      </div>
      ${e.text?`<div class="entry-text${long&&!e.expanded?' clamped':''}" onclick="toggleExpand(${e.id})">${e.text}</div>`:''}
      ${long?`<div class="expand-hint" onclick="toggleExpand(${e.id})">${e.expanded?'↑ 收起':'↓ 展开'}</div>`:''}
      ${imgs}${audios}
    </div>`;
  }).join('');
  setTimeout(captureVideoThumbs,50);
}
