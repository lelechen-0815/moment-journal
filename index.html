<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我的时刻">
<meta name="theme-color" content="#34D399">
<title>我的时刻 🌿</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:#fff;}
body{font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column;}

/* ── Auth ── */
.auth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;}
.auth-logo{font-size:48px;margin-bottom:12px;}
.auth-title{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.auth-sub{font-size:14px;color:#9CA3AF;margin-bottom:36px;}
.auth-card{width:100%;max-width:360px;background:#fff;border:1.5px solid #E5E7EB;border-radius:20px;padding:24px;}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:#F3F4F6;border-radius:12px;padding:3px;}
.auth-tab{flex:1;text-align:center;padding:8px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;color:#6B7280;transition:all .15s;}
.auth-tab.active{background:#fff;color:#1a1a1a;font-weight:600;}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:13px;color:#6B7280;margin-bottom:6px;font-weight:500;}
.auth-field input{width:100%;height:44px;padding:0 14px;border:1.5px solid #E5E7EB;border-radius:12px;font-size:15px;color:#1a1a1a;outline:none;transition:border-color .15s;}
.auth-field input:focus{border-color:#34D399;}
.auth-submit{width:100%;height:46px;background:#34D399;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s;}
.auth-submit:hover{background:#10B981;}
.auth-submit:disabled{background:#D1D5DB;cursor:not-allowed;}
.auth-err{font-size:13px;text-align:center;margin-top:10px;min-height:18px;font-weight:500;}

/* ── Tabbar ── */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #F3F4F6;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;cursor:pointer;gap:3px;}
.tab-icon{font-size:22px;line-height:1;}
.tab-label{font-size:11px;color:#9CA3AF;font-weight:500;}
.tab.active .tab-label{color:#34D399;}

.page{display:none;flex:1;overflow-y:auto;padding-bottom:70px;}
.page.active{display:block;}

/* ── 此刻页 ── */
.topbar{padding:52px 18px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid #F3F4F6;}
.topbar-brand{font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-.5px;}
.topbar-brand span{color:#34D399;}
.topbar-sub{font-size:12px;color:#9CA3AF;margin-top:2px;}
.topbar-count{background:#ECFDF5;color:#059669;font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;white-space:nowrap;}

.cats-scroll{padding:12px 18px 4px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.cats-scroll::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #E5E7EB;color:#6B7280;background:#fff;transition:all .18s;user-select:none;-webkit-user-select:none;}
.cat-chip:hover{border-color:#6EE7B7;color:#059669;}
.cat-chip.active{background:#ECFDF5;border-color:#6EE7B7;color:#059669;}
.cat-chip.custom.pressing{opacity:.6;transform:scale(0.95);}
.custom-cats-label{font-size:11px;color:#9CA3AF;padding:10px 18px 4px;font-weight:500;letter-spacing:.04em;}
.add-cat-wrap{padding:4px 18px 12px;display:flex;gap:8px;}
.add-cat-input{flex:1;height:38px;padding:0 14px;border:1.5px solid #E5E7EB;border-radius:18px;font-size:13px;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s;}
.add-cat-input:focus{border-color:#34D399;}
.add-cat-input::placeholder{color:#D1D5DB;}
.add-cat-btn{height:38px;padding:0 16px;border:1.5px solid #E5E7EB;border-radius:18px;font-size:13px;cursor:pointer;background:#fff;color:#6B7280;font-weight:500;transition:all .15s;}
.add-cat-btn:hover{border-color:#6EE7B7;color:#059669;background:#ECFDF5;}
.divider{height:1px;background:#F3F4F6;margin:0 18px 12px;}

.write-card{margin:0 18px 16px;background:#fff;border-radius:20px;border:1.5px solid #6EE7B7;padding:16px;}
.write-cat-badge{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.current-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:12px;font-size:13px;font-weight:600;}
.badge-hint{font-size:12px;color:#9CA3AF;}
.write-textarea{width:100%;border:none;outline:none;resize:none;font-size:16px;line-height:1.75;color:#1a1a1a;background:transparent;min-height:88px;font-family:inherit;}
.write-textarea::placeholder{color:#D1D5DB;}
.media-bar{display:flex;gap:8px;padding:10px 0 8px;border-top:1px solid #F3F4F6;}
.media-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:12px;border:1.5px solid #E5E7EB;background:#fff;font-size:13px;color:#6B7280;cursor:pointer;font-weight:500;transition:all .15s;}
.media-btn:hover{border-color:#6EE7B7;color:#059669;background:#ECFDF5;}
.media-btn.recording{background:#FFFBEB;border-color:#FCD34D;color:#B45309;}
.img-previews{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px;}
.img-thumb{position:relative;width:72px;height:72px;border-radius:12px;overflow:hidden;border:1.5px solid #E5E7EB;}
.img-thumb img{width:100%;height:100%;object-fit:cover;}
.img-del{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.4);color:#fff;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.audio-preview{display:flex;align-items:center;gap:8px;background:#ECFDF5;border-radius:12px;padding:8px 12px;margin:6px 0 4px;}
.audio-preview audio{flex:1;height:32px;}
.audio-del{background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:20px;line-height:1;padding:0 4px;}
.write-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.char-hint{font-size:12px;color:#D1D5DB;}
.send-btn{display:flex;align-items:center;gap:6px;padding:9px 22px;background:#34D399;color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;}
.send-btn:hover{background:#10B981;}
.send-btn:active{transform:scale(0.97);}
.rec-timer{font-size:12px;color:#B45309;font-weight:600;}

/* ── 回顾页 ── */
.hist-topbar{padding:52px 18px 0;background:#fff;position:sticky;top:0;z-index:10;border-bottom:1px solid #F3F4F6;}
.hist-title{font-size:22px;font-weight:700;color:#1a1a1a;}
.hist-title span{color:#34D399;}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 8px;}
.section-label{font-size:13px;font-weight:600;color:#374151;}
.section-count{font-size:12px;color:#9CA3AF;}
.entries{padding:0 18px 32px;display:flex;flex-direction:column;gap:10px;}
.entry-card{background:#fff;border:1.5px solid #F3F4F6;border-radius:18px;padding:14px 16px;transition:border-color .18s;}
.entry-card:hover{border-color:#6EE7B7;}
.entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.entry-badge{display:flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:10px;font-weight:600;}
.entry-right{display:flex;align-items:center;gap:8px;}
.entry-time{font-size:12px;color:#9CA3AF;}
.more-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:none;cursor:pointer;color:#C4B5FD;font-size:16px;font-weight:700;letter-spacing:1px;line-height:1;transition:all .15s;position:relative;}
.more-btn:hover{background:#F3F4F6;color:#374151;}
.dropdown{position:absolute;top:34px;right:0;background:#fff;border:1.5px solid #E5E7EB;border-radius:14px;padding:6px;min-width:110px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
.dropdown-item{display:flex;align-items:center;padding:9px 14px;border-radius:10px;font-size:14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;color:#374151;transition:background .12s;}
.dropdown-item:hover{background:#F3F4F6;}
.dropdown-item.danger{color:#EF4444;}
.dropdown-item.danger:hover{background:#FEF2F2;}
.entry-text{font-size:15px;color:#374151;line-height:1.7;word-break:break-all;cursor:pointer;}
.entry-text.clamped{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.expand-hint{font-size:12px;color:#34D399;margin-top:5px;font-weight:500;cursor:pointer;}
.entry-imgs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.entry-img{width:80px;height:80px;border-radius:10px;object-fit:cover;border:1.5px solid #F3F4F6;}
.entry-audio{margin-top:8px;}
.entry-audio audio{width:100%;height:32px;}
.edit-area{width:100%;border:1.5px solid #34D399;border-radius:12px;padding:10px 12px;font-size:15px;line-height:1.7;color:#1a1a1a;background:#fff;outline:none;resize:none;font-family:inherit;margin-top:4px;}
.edit-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.save-edit-btn{padding:7px 18px;background:#34D399;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;}
.cancel-edit-btn{padding:7px 14px;background:#fff;color:#6B7280;border:1.5px solid #E5E7EB;border-radius:12px;font-size:13px;cursor:pointer;}

/* ── 个人页 ── */
.profile-topbar{padding:52px 18px 16px;border-bottom:1px solid #F3F4F6;position:sticky;top:0;background:#fff;z-index:10;}
.profile-topbar-title{font-size:22px;font-weight:700;color:#1a1a1a;}
.profile-topbar-title span{color:#34D399;}
.profile-header{display:flex;align-items:center;gap:16px;padding:20px 18px 16px;border-bottom:1px solid #F3F4F6;}
.avatar-wrap{position:relative;cursor:pointer;flex-shrink:0;}
.avatar{width:64px;height:64px;border-radius:50%;background:#ECFDF5;border:2px solid #6EE7B7;display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;transition:transform .15s;}
.avatar:active{transform:scale(0.95);}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-edit-badge{position:absolute;bottom:0;right:0;width:20px;height:20px;background:#34D399;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid #fff;}
.profile-info{flex:1;}
.profile-email{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:3px;}
.profile-joined{font-size:12px;color:#9CA3AF;}
.stats-row{display:flex;padding:16px 18px;gap:12px;border-bottom:1px solid #F3F4F6;}
.stat-card{flex:1;background:#F9FAFB;border-radius:14px;padding:14px 12px;text-align:center;}
.stat-num{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:2px;}
.stat-label{font-size:12px;color:#9CA3AF;}
.p-section{padding:16px 18px 0;}
.p-section-title{font-size:11px;color:#9CA3AF;font-weight:500;letter-spacing:.04em;margin-bottom:8px;}
.menu-card{background:#fff;border:1.5px solid #F3F4F6;border-radius:16px;overflow:hidden;margin-bottom:16px;}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #F9FAFB;cursor:pointer;transition:background .15s;}
.menu-item:last-child{border-bottom:none;}
.menu-item:active{background:#F9FAFB;}
.m-item-left{display:flex;align-items:center;gap:12px;}
.m-item-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.m-item-label{font-size:15px;color:#1a1a1a;font-weight:500;}
.m-item-arrow{color:#D1D5DB;font-size:18px;}
.menu-item.logout .m-item-label{color:#EF4444;}
.menu-item.logout .m-item-arrow{color:#FCA5A5;}

/* ── Emoji picker ── */
.emoji-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:flex-end;justify-content:center;}
.emoji-overlay.show{display:flex;}
.emoji-sheet{background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:480px;}
.emoji-sheet-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:16px;text-align:center;}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.emoji-opt{aspect-ratio:1;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;border:2px solid transparent;transition:all .15s;background:#F9FAFB;}
.emoji-opt:active{transform:scale(0.9);}
.emoji-opt.selected{border-color:#34D399;background:#ECFDF5;}
.upload-opt{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px dashed #D1D5DB;transition:all .15s;background:#F9FAFB;gap:2px;}
.upload-opt:hover{border-color:#34D399;background:#ECFDF5;}
.upload-plus{font-size:22px;color:#9CA3AF;line-height:1;}
.upload-label{font-size:10px;color:#9CA3AF;}
.emoji-cancel{width:100%;height:44px;margin-top:14px;background:#F3F4F6;border:none;border-radius:14px;font-size:15px;color:#6B7280;cursor:pointer;}

/* ── Modal 分类编辑 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;}
.modal-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:16px;}
.modal-input{width:100%;height:44px;padding:0 14px;border:1.5px solid #E5E7EB;border-radius:14px;font-size:15px;color:#1a1a1a;outline:none;transition:border-color .15s;}
.modal-input:focus{border-color:#34D399;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-save{flex:1;height:44px;background:#34D399;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;}
.modal-del{height:44px;padding:0 20px;background:#FEF2F2;color:#EF4444;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;}
.modal-cancel{height:44px;padding:0 20px;background:#F3F4F6;color:#6B7280;border:none;border-radius:14px;font-size:15px;cursor:pointer;}

.empty-state{text-align:center;padding:64px 20px;}
.empty-emoji{font-size:48px;margin-bottom:14px;}
.empty-text{font-size:15px;font-weight:500;color:#9CA3AF;margin-bottom:6px;}
.empty-sub{font-size:13px;color:#D1D5DB;}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#9CA3AF;font-size:14px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- 登录注册页 -->
<div id="auth-page" style="display:none;">
  <div class="auth-page">
    <div class="auth-logo">🌿</div>
    <div class="auth-title">我的时刻</div>
    <div class="auth-sub">记录每一个真实瞬间</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">登录</div>
        <div class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">注册</div>
      </div>
      <div class="auth-field">
        <label>邮箱</label>
        <input type="email" id="auth-email" placeholder="your@email.com">
      </div>
      <div class="auth-field">
        <label>密码</label>
        <input type="password" id="auth-password" placeholder="至少 6 位" onkeydown="if(event.key==='Enter')doAuth()">
      </div>
      <button class="auth-submit" id="auth-btn" onclick="doAuth()">登录</button>
      <div class="auth-err" id="auth-err"></div>
    </div>
  </div>
</div>

<!-- 主 App -->
<div class="app" id="main-app" style="display:none;">

  <!-- 此刻 -->
  <div class="page active" id="page-now">
    <div class="topbar">
      <div>
        <div class="topbar-brand">我的时刻<span> 🌿</span></div>
        <div class="topbar-sub">记录每一个真实瞬间</div>
      </div>
      <div class="topbar-count" id="total-count">0 条</div>
    </div>
    <div class="cats-scroll" id="home-sys-cats"></div>
    <div class="custom-cats-label">我的分类</div>
    <div class="cats-scroll" id="home-custom-cats"></div>
    <div class="add-cat-wrap">
      <input class="add-cat-input" id="new-cat-input" placeholder="输入新分类名称…" maxlength="10">
      <button class="add-cat-btn" onclick="addCat()">+ 添加</button>
    </div>
    <div class="divider"></div>
    <div class="write-card">
      <div class="write-cat-badge" id="write-cat-badge"></div>
      <textarea class="write-textarea" id="write-text" placeholder="此刻的感受、想法、发现…" maxlength="500" oninput="updateChar()"></textarea>
      <div id="img-previews" class="img-previews"></div>
      <div id="audio-preview"></div>
      <div class="media-bar">
        <button class="media-btn" onclick="triggerImg()"><span style="font-size:16px">🖼️</span> 图片</button>
        <button class="media-btn" id="rec-btn" onclick="toggleRecord()">
          <span style="font-size:16px">🎙️</span>
          <span id="rec-label">语音</span>
          <span class="rec-timer" id="rec-timer" style="display:none"></span>
        </button>
      </div>
      <input type="file" id="img-input" accept="image/*" multiple style="display:none" onchange="handleImgs(event)">
      <div class="write-footer">
        <span class="char-hint" id="char-hint">0 / 500</span>
        <button class="send-btn" onclick="saveEntry()"><span style="font-size:16px">🌟</span> 记录</button>
      </div>
    </div>
  </div>

  <!-- 回顾 -->
  <div class="page" id="page-review">
    <div class="hist-topbar">
      <div class="hist-title">回顾<span> 📖</span></div>
      <div class="cats-scroll" id="hist-cats"></div>
    </div>
    <div class="section-head">
      <span class="section-label" id="hist-label">🌈 全部记录</span>
      <span class="section-count" id="hist-count"></span>
    </div>
    <div class="entries" id="entries-list"></div>
  </div>

  <!-- 个人 -->
  <div class="page" id="page-profile">
    <div class="profile-topbar">
      <div class="profile-topbar-title">个人<span> 🌿</span></div>
    </div>
    <div class="profile-header">
      <div class="avatar-wrap" onclick="openEmojiPicker()">
        <div class="avatar" id="user-avatar"><span id="avatar-content">🪴</span></div>
        <div class="avatar-edit-badge">✏️</div>
      </div>
      <div class="profile-info">
        <div class="profile-email" id="profile-email">—</div>
        <div class="profile-joined" id="profile-joined">—</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-entries">0</div>
        <div class="stat-label">累计记录</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-days">0</div>
        <div class="stat-label">连续天数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-cats">0</div>
        <div class="stat-label">我的分类</div>
      </div>

// ── Auth ──
function switchAuthTab(mode){
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-signup').classList.toggle('active',mode==='signup');
  document.getElementById('auth-btn').textContent=mode==='login'?'登录':'注册';
  document.getElementById('auth-err').textContent='';
}

async function doAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const btn=document.getElementById('auth-btn');
  const err=document.getElementById('auth-err');
  err.style.color='#EF4444';
  if(!email||!password){err.textContent='请填写邮箱和密码';return;}
  if(password.length<6){err.textContent='密码至少 6 位';return;}
  btn.disabled=true;btn.textContent='处理中…';err.textContent='';
  try{
    if(authMode==='login'){
      const{data,error}=await sb.auth.signInWithPassword({email,password});
      if(error){
        if(error.message.includes('Invalid login credentials'))throw new Error('邮箱或密码错误');
        throw new Error('登录失败，请重试');
      }
      currentUser=data.user;
      await initApp();
    }else{
      const{data,error}=await sb.auth.signUp({email,password});
      if(error){
        if(error.message.includes('already registered')||error.message.includes('User already registered')){
          err.style.color='#D97706';
          err.textContent='该邮箱已注册，请直接登录';
          btn.disabled=false;btn.textContent='注册';
          switchAuthTab('login');return;
        }
        throw new Error('注册失败：'+error.message);
      }
      if(data.session){
        currentUser=data.user;
        await initApp();
      }else{
        err.style.color='#059669';
        err.textContent='注册成功！验证邮件已发送，请查收并完成验证。';
        btn.disabled=false;btn.textContent='注册';
        switchAuthTab('login');return;
      }
    }
  }catch(e){
    err.style.color='#EF4444';
    err.textContent=e.message||'操作失败，请重试';
    btn.disabled=false;
    btn.textContent=authMode==='login'?'登录':'注册';
  }
}

async function saveCat(){

async function deleteCat(){
  const cat=customCats.find(c=>c.id===editingCatId);
  const affected=entries.filter(e=>e.catId===editingCatId).length;
  const msg=affected>0
    ?`删除「${cat.name}」分类后，该分类下的 ${affected} 条记录将自动归入「日常」，是否继续？`
    :`确定删除「${cat.name}」分类？`;
  if(!confirm(msg))return;
  // 本地更新
  entries.forEach(e=>{if(e.catId===editingCatId)e.catId='daily';});
  // 云端更新
  await sb.from('entries').update({cat_id:'daily'}).eq('cat_id',editingCatId).eq('user_id',currentUser.id);
  await sb.from('custom_cats').delete().eq('id',editingCatId);
  customCats=customCats.filter(c=>c.id!==editingCatId);
  if(activeCat===editingCatId)activeCat=SYS_CATS[0].id;
  if(histCat===editingCatId)histCat='all';
  document.getElementById('cat-modal').classList.remove('show');editingCatId=null;
  renderHomeCats();renderWriteBadge();renderHistCats();renderEntries();updateProfilePage();
  toast(affected>0?`分类已删除，${affected} 条记录已归入「日常」`:'分类已删除');
}

async function loadEntries(){

async function saveEntry(){
  const text=document.getElementById('write-text').value.trim();

  const id=Date.now();

  entries.unshift(entry);
  document.getElementById('write-text').value='';
  pendingImgs=[];pendingAudio=null;
  updateChar();renderImgPrev();renderAudioPrev();renderCount();updateProfilePage();
  toast('记录成功 🌿');
  await sb.from('entries').insert({id,user_id:currentUser.id,cat_id:activeCat,text,imgs:entry.imgs,audio:entry.audio,ts});

// ── Render entries ──
function renderEntries(){
  const list=document.getElementById('entries-list');
  const filtered=histCat==='all'?entries:entries.filter(e=>e.catId===histCat);
  document.getElementById('hist-count').textContent=filtered.length?`共 ${filtered.length} 条`:'';
  if(!filtered.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-emoji">🌿</div><div class="empty-text">还没有记录</div><div class="empty-sub">去此刻记录你的第一个时刻吧～</div></div>`;
    return;
  }
  list.innerHTML=filtered.map(e=>{
    const cat=allCats().find(c=>c.id===e.catId)||SYS_CATS[0];
    const long=e.text&&e.text.length>100;
    const isEditing=editingEntryId===e.id;
    const imgs=e.imgs?.length?`<div class="entry-imgs">${e.imgs.map(s=>`<img class="entry-img" src="${s}">`).join('')}</div>`:'';
    const audio=e.audio?`<div class="entry-audio"><audio controls src="${e.audio}"></audio></div>`:'';
    const textBlock=isEditing
      ?`<textarea class="edit-area" id="edit-ta-${e.id}" rows="4">${e.text||''}</textarea>
        <div class="edit-footer">
          <button class="cancel-edit-btn" onclick="cancelEditEntry()">取消</button>
          <button class="save-edit-btn" onclick="saveEditEntry(${e.id})">保存</button>
        </div>`
      :`${e.text?`<div class="entry-text${long&&!e.expanded?' clamped':''}" onclick="toggleExpand(${e.id})">${e.text}</div>`:''}
        ${long?`<div class="expand-hint" onclick="toggleExpand(${e.id})">${e.expanded?'↑ 收起':'↓ 展开'}</div>`:''}`;
    return`<div class="entry-card">
      <div class="entry-top">
        <div class="entry-badge" style="background:${cat.bg};color:${cat.color}">
          <span style="font-size:13px">${cat.emoji||''}</span>${cat.name}
        </div>
        <div class="entry-right">
          <span class="entry-time">${fmtTime(e.ts)}</span>
          <div style="position:relative">
            <button class="more-btn" onclick="toggleMenu('menu-${e.id}')">···</button>

            </div>
          </div>
        </div>

      ${textBlock}${imgs}${audio}
    </div>`;
  }).join('');
}

function fmtTime(iso){
  const d=new Date(iso);
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+
    ' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function updateChar(){document.getElementById('char-hint').textContent=document.getElementById('write-text').value.length+' / 500';}
function triggerImg(){document.getElementById('img-input').click();}
function handleImgs(e){
  const files=[...e.target.files];
  if(pendingImgs.length+files.length>9){toast('最多 9 张图片');return;}
  files.forEach(f=>{const r=new FileReader();r.onload=ev=>{pendingImgs.push(ev.target.result);renderImgPrev();};r.readAsDataURL(f);});
  e.target.value='';
}
function renderImgPrev(){
  document.getElementById('img-previews').innerHTML=pendingImgs.map((s,i)=>
    `<div class="img-thumb"><img src="${s}"><button class="img-del" onclick="rmImg(${i})">×</button></div>`).join('');
}
function rmImg(i){pendingImgs.splice(i,1);renderImgPrev();}
async function toggleRecord(){
  if(mediaRecorder&&mediaRecorder.state==='recording'){stopRec();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];
    const mimeType=MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':
                   MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'';
    mediaRecorder=mimeType?new MediaRecorder(stream,{mimeType}):new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=()=>{
      const blob=new Blob(audioChunks,{type:mimeType||'audio/mp4'});
      const r=new FileReader();r.onload=ev=>{pendingAudio=ev.target.result;renderAudioPrev();toast('录音完成 🎙️');};r.readAsDataURL(blob);
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start();recSeconds=0;
    document.getElementById('rec-btn').classList.add('recording');
    document.getElementById('rec-label').textContent='停止';
    document.getElementById('rec-timer').style.display='inline';
    recInterval=setInterval(()=>{
      recSeconds++;
      document.getElementById('rec-timer').textContent=String(Math.floor(recSeconds/60)).padStart(2,'0')+':'+String(recSeconds%60).padStart(2,'0');
      if(recSeconds>=60){stopRec();toast('最长录音 60 秒');}
    },1000);
  }catch{toast('无法访问麦克风，请确认在 HTTPS 下使用并允许权限');}
}
function stopRec(){
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    mediaRecorder.stop();clearInterval(recInterval);
    document.getElementById('rec-btn').classList.remove('recording');
    document.getElementById('rec-label').textContent='语音';
    document.getElementById('rec-timer').style.display='none';
  }
}
function renderAudioPrev(){
  document.getElementById('audio-preview').innerHTML=pendingAudio?
    `<div class="audio-preview"><audio controls src="${pendingAudio}"></audio><button class="audio-del" onclick="rmAudio()">×</button></div>`:'';
}
function rmAudio(){pendingAudio=null;renderAudioPrev();}
function toggleMenu(id){
  const m=document.getElementById(id);
  const show=m.style.display==='none';
  document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
  m.style.display=show?'block':'none';
  if(show){setTimeout(()=>document.addEventListener('click',function h(e){if(!m.contains(e.target)){m.style.display='none';document.removeEventListener('click',h);}},10));}
}
function closeMenu(id){document.getElementById(id).style.display='none';}
function startEditEntry(id){document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');editingEntryId=id;renderEntries();setTimeout(()=>{const ta=document.getElementById('edit-ta-'+id);if(ta){ta.focus();ta.selectionStart=ta.value.length;}},50);}
function cancelEditEntry(){editingEntryId=null;renderEntries();}
function toggleExpand(id){const e=entries.find(e=>e.id===id);if(e){e.expanded=!e.expanded;renderEntries();}}

function switchTab(tab){
  ['now','review','profile'].forEach(t=>{
    document.getElementById('page-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='review')renderEntries();
  if(tab==='profile')updateProfilePage();
}

document.getElementById('new-cat-input').addEventListener('keydown',e=>{if(e.key==='Enter')addCat();});
document.getElementById('modal-cat-input').addEventListener('keydown',e=>{if(e.key==='Enter')saveCat();});

// ── Boot ──
(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session){currentUser=session.user;await initApp();}
  else{document.getElementById('auth-page').style.display='block';}
})();
</script>
</body>
